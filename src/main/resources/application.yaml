spring:
  application:
    name: ms-books-catalogue
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PWD}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

## Configuracion de Instancia 
server:
  port: ${PORT:8080}

## Configuracion del cliente de Eureka
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}
  instance:
    preferIpAddress: true
    hostname: ms-books-catalogue

##OpenSearch config
opensearch:
  host: ${OPENSEARCH_HOST:yielding-redbud-1mp2hkcd.us-east-1.bonsaisearch.net}
  credentials:
    user: ${OPENSEARCH_USER:622723c7bb}
    password: ${OPENSEARCH_PWD:a0dd9c53783319a4fc6b}
  logging:
    level:
      tracer: TRACE